<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>다이어트 ㄱㄱ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>다이어트 ㄱㄱ</h1>

        <p class="day" id="dayCounter"></p>

        <div id="rankingContainer"></div>

        <hr>

        <div class="login-box">

            <h2>로그인</h2>

            <input
                type="text"
                id="username"
                placeholder="아이디">

            <input
                type="password"
                id = "password"
                placeholder="비밀번호">

            <button 
                class="login-btn"
                id="loginBtn">
                로그인
            </button>

            <button 
                class="signup-btn"
                id="signupBtn">
                회원가입
            </button>

        </div>


        <div id="startWeightBox" style="display:none;">

            <h2>시작 체중 입력</h2>

            <p>시작 체중을 입력해주세요.</p>

            <input
                type="number"
                id="startWeightInput"
                step="0.1"
                placeholder="시작 체중">

            <button id="saveStartWeightBtn">
                시작하기
            </button>

        </div>

        <div id="weightBox" style="display:none;">
            
            <h2>오늘의 체중</h2>

            <input
                type="number"
                id="weightInput"
                step="0.1"
                placeholder="체중 입력">

            <button id="saveWeightBtn">
                저장
            </button>

        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
